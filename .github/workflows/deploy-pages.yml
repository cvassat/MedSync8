name: Deploy frontend (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "index.html"
      - "vite.config.js"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires two repo secrets:
    #   CLOUDFLARE_API_TOKEN  (scoped to "Cloudflare Pages: Edit")
    #   CLOUDFLARE_ACCOUNT_ID
    # And one optional repo variable:
    #   VITE_API_BASE         (defaults to http://localhost:8000 if unset)
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8000' }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=medsync8-telepsych
