name: Deploy frontend (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires two repo secrets:
    #   CLOUDFLARE_API_TOKEN  (scoped to "Cloudflare Pages: Edit")
    #   CLOUDFLARE_ACCOUNT_ID
    # And one optional repo variable:
    #   VITE_API_BASE         (defaults to http://localhost:8000 if unset)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE || 'http://localhost:8000' }}
        run: npm run build

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy frontend/dist --project-name=medsync8-telepsych
